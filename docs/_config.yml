title: AutoVerdict
description: 엔카 중고차 매물 자동 평가 Chrome 확장
theme: jekyll-theme-primer

# Jekyll이 docs/ 아래를 스캔할 때 평가/디자인/샘플 문서는 공개할 필요가
# 없고 빌드 시간도 늘어나므로 전부 제외한다. Chrome Web Store 등록에
# 필요한 공개 페이지는 아래 두 개뿐:
#   - PRIVACY.md          → Privacy Policy URL용
#   - CHROME_WEB_STORE.md  → 내부 체크리스트 (원하면 그대로 공개 가능)
exclude:
  - design
  - discovery
  - plan
  - superpowers
  - CODEMAPS
  - _site

# 기본 레이아웃: 마크다운 파일에 front-matter가 없어도 theme 레이아웃이 적용되도록
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
